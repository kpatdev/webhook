name: Build and Push Docker Image

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get latest almir/webhook version tag from Docker Hub
        id: get-version
        run: |
          # Get all tags, filter semver, sort and pick the latest
          TAG=$(curl -s 'https://registry.hub.docker.com/v2/repositories/almir/webhook/tags?page_size=100' |
            jq -r '.results[].name' |
            grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' |
            sort -V |
            tail -n1)
          echo "Latest webhook version: $TAG"
          echo "webhook_version=$TAG" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.get-version.outputs.webhook_version }}
            ghcr.io/${{ github.repository }}:latest
          build-args: |
            BASE_IMAGE=almir/webhook:${{ steps.get-version.outputs.webhook_version }}